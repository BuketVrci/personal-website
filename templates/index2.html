<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Greating page"</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #37a976; 
            margin: 0;
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .card {
            background-color: white;
            padding: 40px;
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center;
            max-width: 400px;
        }

        h1 {
            color: #c903ab;
            margin-top: 0;
            font-size: 28px;
        }

        p {
            color: #37a976;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 24px;
            background-color: #c903ab;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 1s ease;
            transition: border-radius 1s ease;
        }

        .btn:hover {
            background-color: #a50249;
            border-radius: 100px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>PAGE 2</h1>
        <p>Greatest Sir Köpük Naz</p>
        
        <a href="#" class="btn">Basics</a>
        <a href="#" class="btn">Advanced</a>
    </div>

</body>
</html>
